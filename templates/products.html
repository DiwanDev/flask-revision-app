{% extends "base.html" %}

{% block content %}

<h1>Deman Products</h1>

<div class="products-container">

    {% for product in products %}

        <div class="product-card">

            <img
                src="{{ product.image_url }}"
                alt="{{ product.name }}"
                class="product-image"
            >

            <h2>{{ product.name }}</h2>

            <p>{{ product.description }}</p>

            <p>
                <strong>Category:</strong>
                {{ product.category }}
            </p>

            <p class="product-price">
                ₹{{ product.price }}
            </p>

            <p>
                Stock available: {{ product.stock }}
            </p>

            <form action="{{ url_for('add_to_cart') }}" method="POST">

                <input
                    type="hidden"
                    name="product_id"
                    value="{{ product.id }}"
                >

                <button type="submit">
                    Add to Cart
                </button>

            </form>

        </div>

    {% endfor %}

</div>

{% endblock %}
