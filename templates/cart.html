{% extends "base.html" %}

{% block content %}

<h1>Your Cart</h1>

{% if cart_products %}

    {% for product in cart_products %}

        <div class="product-card">

            <img
                src="{{ product.image_url }}"
                alt="{{ product.name }}"
                class="product-image"
            >

            <h2>{{ product.name }}</h2>

            <p>₹{{ product.price }}</p>

            <p>Available stock: {{ product.stock }}</p>

        </div>

    {% endfor %}

    <a href="{{ url_for('checkout') }}" class="checkout-button">
    Proceed to Checkout
</a>

{% else %}

    <p>Your cart is empty.</p>

{% endif %}

{% endblock %}
